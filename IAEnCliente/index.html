<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primer Asistente con IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <h1>IA en el cliente</h1>
        <p class="subtitle">Pregúntale lo que quieras a tu código</p>
        
        <div class="output-box" id="output">
            <span class="placeholder">La respuesta de la IA aparecerá aquí...</span>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta aquí..." autocomplete="off">
            <button id="sendBtn">Preguntar</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
